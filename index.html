    var ifr = document.getElementById('ifr')
    
    function loadn(src, element) {
      ifr.data = src
      
      document.querySelector('.dhls.active')?.classList.remove('active')
      
      element.classList.add('active')
    }
    
    /* var dhls = document.querySelectorAll('#dhl div')

    var xieyi = document.getElementById('xieyi')
    var xybtn = document.getElementById('xybtn')
    
    if (!localStorage.getItem('xyload1')) {
      xieyi.style.display = 'flex'
    } else {
