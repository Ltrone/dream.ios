<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="viewport" content="width=device-width, initial-scale=1,user-scalable=no">
	<title>设置</title>
	<style type="text/css" media="all">
		body {
			background: #000000;
		}
		
		* {
			margin: 0;
			padding: 0;
			user-select: none;
			-webkit-tap-highlight-color: transparent;
		}
		
		#btn {
			width: 32px;
			height: 32px;
			background: #111214;
			border: none;
			color: #eeeeee;
			font-weight: bold;
			border-radius: 10px;
			margin-left: 4vh;
			margin-top: 4vh;
		}
		
		#bodys {
			width: 90vw;
			height: 500px;
			border-radius: 10px;
			margin: 20px auto;
			box-shadow: 20px 20px 50px rgba(0, 0, 0, 0.5);
			border-top: 1px solid rgba(255, 255, 255, 0.1);
			border-left: 1px solid rgba(255, 255, 255, 0.1);
			backdrop-filter: blur(12px);
			background-color: #111214;
			display: flex;
			justify-content: space-evenly;
			align-items: center;
			flex-direction: column;
		}
		
		#bodys div {
			width: 90vw;
			height: 64px;
			margin: 0 auto;
			display: flex;
			justify-content: space-evenly;
			align-items: center;
			flex-direction: column;
		}
		
		
		
		#bodys div h4 {
			width: 64vw;
			height: 64px;
			font-size: 24px;
			color: #eee;
			line-height: 64px;
			border-bottom: 1px solid #eee;
		}
	</style>
</head>

<body>
	<div style="background: #111214;color: #eeeeee;font-weight: bold;height: 64px;display: flex;justify-content: center;align-items: center;font-size: 32px;box-shadow: 0px 0px 10px snow;">
		设置
	</div>
	<div>
		<button id="btn" type="submit">←</button>
	</div>
	<div id="bodys">
		<div>
			<h4 id="sm">使用说明</h4>
		</div>
		<div>
			<h4 id="sz"></h4>
		</div>
		<div>
			<h4></h4>
		</div>
		<div>
			<h4 id="gy">关于追梦</h4>
		</div>
	</div>
	<script type="text/javascript" charset="utf-8">
		var btn = document.getElementById('btn')
		var sm = document.getElementById('sm')
		var sz = document.getElementById('sz')
		var gy = document.getElementById('gy')
		
		btn.addEventListener('click', function(e) {
			e.preventDefault()
			
			setTimeout(function() {
				history.back()
			}, 300)
		})
		
		sm.addEventListener('click', function(e) {
			e.preventDefault()
			
			setTimeout(function() {
				top.location.href = 'sm.html'
			}, 300)
		})
		
		gy.addEventListener('click', function(e) {
			e.preventDefault()
			
			setTimeout(function() {
				top.location.href = 'gy.html'
			}, 300)
		})
		
		var clicks = document.querySelectorAll('#bodys div')
		var h4s = document.querySelectorAll('#bodys div h4')
		
		clicks.forEach(function(clickss, index) {
			
			var h4 = h4s[index]
			
			clickss.addEventListener('touchstart', function() {
				clickss.style.background = '#1c1d1f'
				h4.style.borderBottom = '#eeeeee'
			})
			
			clickss.addEventListener('touchend', function() {
				clickss.style.background = ''
				h4.style.borderBottom = ''
			})
		})
	</script>
</body>

</html>
