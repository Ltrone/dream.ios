<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1,user-scalable=no">
  
  <title>index1</title>
  
  <!-- HTML -->
  
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
  <style type="text/css" media="all">
    html {
      scroll-behavior: smooth;
    }
    
    body {
      background: #000000;
      user-select: none;
      font-style: "黑体";
    }
    
    * {
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    
    #nav {
      width: 100vw;
      height: 10vh;
      position: fixed;
      background: #111214;
      display: grid;
      place-items: center;
      z-index: 100;
      box-shadow: 0px 0px 10px snow;
    }
    
    #nav a {
      width: 80vw;
      height: 32px;
      border-radius: 50px;
      background: #1c1d1f;
      text-align: center;
      line-height: 32px;
      text-decoration: none;
      font-weight: bold;
      color: #eeeeee;
    }
    
    .list {
      margin-top: 10px;
      width: 90vw;
      height: 20vh;
      background: #111214;
      border-radius: 10px;
    }
    
    .p {
      height: 80px;
      position: relative;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 2vh;
      font-weight: bold;
    }
    
    .time {
      position: relative;
      color: white;
      font-size: 1.5vh;
      color: #555555;
      font-weight: bold;
      margin-top: 0px;
      margin-left: 10px;
    }
    
    #divbody {
      width: 95vw;
      height: 80vh;
      display: flex;
      justify-content: center;
      margin-top: 100px;
      overflow-x: hidden;
    }
    
    .a {
      position: relative;
      left: 10px;
      color: #00d4ff;
      text-decoration: none;
      font-size: 2vh;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div id="nav">
    <a href="#">追梦日志</a>
  </div>
  <div style="position: relative;top: 10vh;display: flex;flex-direction: column;align-items: center;">
    <div style="display: flex;color: #eeeeee;font-weight: bold;margin-top: 10px;flex-direction: row;justify-content: flex-end;width: 90vw;height: auto;">
      <div id="sz">
        
      </div>
    </div>
    <div id="dt" style="margin: 10px 0px auto;color: white;border-left: 10px solid deepskyblue;padding-left: 5px;font-weight: bold;">
      动态
    </div>
  </div>
  <div id="divbody">
    <h5 id="h5s" style="text-align: center;color: #eeeeee;margin: 20px auto;">加载中...</h5>
    <div id="lv">
      <div class="list" id="list">
        <p class="p"></p>
        <a class="a" href="javascript:void(0)"></a>
        <p class="time"></p>
        <div style="width: 100%;height: 100%;color: #eeeeee;display: flex;">
          
        </div>
      </div>
    </div>
  </div>
  <script src="os.js"></script>
  <script type="text/javascript" charset="utf-8">
    var list = document.getElementById('list')
    var lv = document.getElementById('lv')
    var h5s = document.getElementById('h5s')
    
    lv.innerHTML = ''
    
    load()
    
    function load() {
      fetch('https://ltrone.github.io/datan/key.json')
        .then(rel => rel.json())
        .then(data => {
          console.log(data)
          h5s.innerHTML = ''
          for (var i = 0; i < data.rows.length; i++) {
            lv.innerHTML += `<div id="lv">
      <div class="list" data-id="${data.rows[i].id}">
        <p class="p">${data.rows[i].p}</p>
        <a class="a" href="${data.rows[i].href}">${data.rows[i].a}</a>
        <p class="time">${data.rows[i].time}</p>
        <div style="width: 100%;height: 100%;color: #eeeeee;display: flex;">
          
        </div>
      </div>
    </div>`
          }
        })
        .catch(() => setTimeout(load, 200))
    }
    
    var dt = document.getElementById('dt')
    dt.addEventListener('click', function() {
      location.reload()
    })
    
    var sz = document.getElementById('sz')
    sz.addEventListener('click', function() {
      location.href = 'sz.html'
    })
    
    
    list.addEventListener('click', function(e) {
      var lists = e.target.closest('.list')
      if (lists) {
        localStorage.setItem('nrxqyid', lists.dataset.id)
        location.href = 'xqye.html'
      }
    })
  </script>
</body>

</html>
